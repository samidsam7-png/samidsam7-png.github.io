<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sam7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">
    <div class="container">
        <div class="form-box">
            <h1 class="title">Dashboard</h1>
            <div class="user-info">
                <div class="avatar">👋</div>
                <h2 id="welcome-text">Selamat datang!</h2>
                <p id="user-email">Loading...</p>
            </div>
            <div class="stats">
                <div class="stat-card"><h3>0</h3><p>Project</p></div>
                <div class="stat-card"><h3>1</h3><p>Login Hari Ini</p></div>
            </div>
            <p id="message" class="message"></p>
            <button id="logout-btn" class="btn btn-logout">Logout</button>
        </div>
    </div>
    <footer class="footer">Made by <a href="https://sam7.my.id" target="_blank" rel="noopener">Sam7</a></footer>
    <script src="dashboard.js"></script>
</body>
</html>
