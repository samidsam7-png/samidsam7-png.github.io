<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samid</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box}
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 40px; max-width: 500px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .profile {
            width: 120px; height: 120px; border-radius: 50%;
            object-fit: cover; border: 3px solid white; margin-bottom: 20px;
        }
        h1 {font-size: 2.2em; margin-bottom: 10px}
        .tagline {font-size: 1.1em; opacity: 0.9; margin-bottom: 30px}
        .btn {
            display: inline-block; background: white; color: #667eea;
            padding: 12px 30px; border-radius: 50px; text-decoration: none;
            font-weight: bold; margin: 5px; transition: 0.3s;
        }
        .btn:hover {transform: scale(1.05)}
    </style>
</head>
<body>
    <div class="card">
  <p class="tagline">SAMID</p>
  <h1 id="typing-text" style="min-height: 60px;"></h1>
  <p id="typing-author" style="opacity:0;">- Nelson Mandela -</p>
  <a href="halaman2.html" class="btn">Deskripsi</a>
    </div>
 <script>
  const text = `"It all seems impossible until it's done."`;
  const author = `- Nelson Mandela -`;
  let i = 0;
  const speed = 60; // 
  
  function typeWriter() {
    if (i < text.length) {
      document.getElementById("typing-text").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, speed);
    } else {
      // Munculin nama author setelah quote selesai
      document.getElementById("typing-author").style.opacity = 1;
      document.getElementById("typing-author").style.transition = "opacity 1s";
    }
  }
  
  // Mulai ngetik pas halaman kebuka
  window.onload = typeWriter;
</script>
</body>
</html>
