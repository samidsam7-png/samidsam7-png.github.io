<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Samid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; }
        .header {
            background: #c0392b; color: white; padding: 15px;
            display: flex; align-items: center; position: fixed;
            width: 100%; top: 0; z-index: 100;
        }
        .menu-btn {
            font-size: 24px; background: none; border: none;
            color: white; margin-right: 15px; cursor: pointer;
        }
        .sidebar {
            background: #c0392b; color: white; width: 250px;
            height: 100vh; position: fixed; left: -250px; top: 0;
            padding-top: 60px; transition: 0.3s; z-index: 99;
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            display: block; color: white; padding: 15px 20px;
            text-decoration: none; border-bottom: 1px solid #a93226;
        }
        .sidebar a:hover { background: #a93226; }
        .content { margin-top: 60px; padding: 20px; transition: 0.3s; }
        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 98;
        }
        .overlay.active { display: block; }
        .copyright {
            position: absolute; bottom: 20px; width: 100%; 
            text-align: center; font-size: 11px; padding: 0 15px;
            color: #f5b7b1;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h3>SAMID</h3>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
        <div class="copyright">
            &copy; 2026 Hak cipta Dilindungi<br>All Rights Reserved
        </div>
    </div>

    <div class="content">
        <h1>Selamat Datang di Website saya</h1>
        <p>ini adalah cara membuat website dengan terminal linux HTML dan Css.</p>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
